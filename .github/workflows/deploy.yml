name: Deploy to Vercel (Production)

on:
  push:
    branches:
      - develop # develop 브랜치에 머지될 때만 배포

  workflow_dispatch: # 수동 배포 트리거
    inputs:
      triggerReason:
        description: "Why are you manually deploying?"
        required: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env file
        run: |
          cp .env.was.template .env
          export EC2_DOMAIN_NAME=${{ secrets.EC2_DOMAIN_NAME }}
          envsubst < .env > .env.final
          mv .env.final .env

      - name: Debug .env
        run: cat .env

      - name: Build React App
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel (Production)
        run: vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --confirm
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
